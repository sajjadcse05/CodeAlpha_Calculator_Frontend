<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Basic Calculator</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="main-header">
        <h1>Calculator System</h1>
    </header>

    <main class="calculator-container">
        <div class="calculator-screen">
            <div id="expression-display" class="expression-line"></div>
            <div id="result-display" class="result-line">0</div>
        </div>

        <div class="calculator-buttons">
            <button class="btn action-btn" data-action="clear" id="key-clear">AC</button>
            <button class="btn action-btn" data-action="delete" id="key-backspace"><i class="fas fa-backspace"></i></button>
            <button class="btn action-btn" data-operator="%" data-display="%">%</button>
            <button class="btn op-btn" data-operator="/" data-display="÷">÷</button>

            <button class="btn num-btn">7</button>
            <button class="btn num-btn">8</button>
            <button class="btn num-btn">9</button>
            <button class="btn op-btn" data-operator="*" data-display="×">×</button>

            <button class="btn num-btn">4</button>
            <button class="btn num-btn">5</button>
            <button class="btn num-btn">6</button>
            <button class="btn op-btn" data-operator="-">-</button>

            <button class="btn num-btn">1</button>
            <button class="btn num-btn">2</button>
            <button class="btn num-btn">3</button>
            <button class="btn op-btn" data-operator="+">+</button>

            <button class="btn num-btn double-width">0</button>
            <button class="btn num-btn" data-action="decimal">.</button>
            <button class="btn equals-btn" data-action="calculate" id="key-equals">=</button>
        </div>
    </main>

    <footer class="main-footer">
        <p>Made by <span>Md Sajjad Hossain</span></p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
